<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratinhos Gourmet - Monte seu Pedido</title>
    
    <style>
        :root {
            --verde: #16a34a;
            --verde-escuro: #15803d;
            --azul: #2563eb;
            --fundo: #f1f5f9;
            --texto: #334155;
            --branco: #ffffff;
            --borda: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--fundo);
            color: var(--texto);
            line-height: 1.5;
            padding-bottom: 100px;
        }

        header {
            background: var(--branco);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--borda);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* ETAPAS */
        .etapas {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 5px;
        }

        .passo {
            flex: 1;
            background: var(--borda);
            padding: 8px 2px;
            border-radius: 6px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
        }

        .passo.ativo {
            background: var(--azul);
            color: white;
        }

        /* GRID E CARDS */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background: var(--branco);
            border: 2px solid var(--borda);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .card.selecionado {
            border-color: var(--verde);
            background: #f0fdf4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .emoji-grande {
            font-size: 45px;
            display: block;
            margin-bottom: 10px;
        }

        .preco {
            color: var(--verde);
            font-weight: bold;
            font-size: 14px;
        }

        /* CONTROLES */
        .controles {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            background: #f8fafc;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .btn-circular {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: var(--azul);
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-circular:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* RODAPÉ */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--branco);
            padding: 15px 20px;
            border-top: 2px solid var(--borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .btn-acao {
            background: var(--verde);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .item-carrinho {
            border-bottom: 1px solid var(--borda);
            padding: 10px 0;
        }

        /* TELA FECHADO */
        #tela-fechada {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div id="tela-fechada">
    <span style="font-size: 80px;">😴</span>
    <h1 style="color:#ef4444; margin:20px 0;">ESTAMOS FECHADOS</h1>
    <p style="color:#64748b;">Funcionamento: 18:00 às 23:58</p>
    
</div>

<header id="cabecalho">
    <h2 id="titulo-etapa">Escolha o Tamanho</h2>
    <p id="subtitulo" style="font-size: 13px; color: #64748b;">Selecione uma opção abaixo</p>
</header>

<div class="container" id="app">
    <div class="etapas">
        <div class="passo ativo" id="p0">Tamanho</div>
        <div class="passo" id="p1">Proteínas</div>
        <div class="passo" id="p2">Carbo</div>
        <div class="passo" id="p3">Extras</div>
    </div>

    <div id="area-selecao" class="grid"></div>
</div>

<div id="modal-carrinho" class="modal">
    <div class="modal-content">
        <h2>Seu Pedido 🛒</h2>
        <div id="lista-carrinho"></div>
        <h3 id="total-modal" style="margin: 15px 0; text-align: right;">Total: R$ 0,00</h3>
        <button class="btn-acao" style="width: 100%;" onclick="enviarWhatsApp()">Enviar para WhatsApp</button>
        <button onclick="fecharCarrinho()" style="width: 100%; margin-top: 10px; background: none; border: none; color: #64748b; cursor: pointer;">Voltar</button>
    </div>
</div>

<footer>
    <div>
        <span style="font-size: 11px;">Total Atual:</span><br>
        <strong id="visor-total" style="font-size: 18px; color: var(--verde);">R$ 0,00</strong>
    </div>
    <div style="display: flex; gap: 8px;">
        <button onclick="abrirCarrinho()" style="background:#e2e8f0; border:none; padding:10px; border-radius:8px; cursor:pointer;">
            🛒 <span id="contagem-carrinho">0</span>
        </button>
        <button id="btn-proximo" class="btn-acao" onclick="avancar()">Avançar</button>
    </div>
</footer>

<script>
const DADOS = {
    tamanhos:[
        { id:1, nome:"Pequeno (P)", valor:12, limiteProt:1, icone:"🥣"},
        { id:2, nome:"Médio (M)", valor:14, limiteProt:2, icone:"🍽️"},
        { id:3, nome:"Grande (G)", valor:17, limiteProt:2, icone:"🍱"},
        { id:4, nome:"Família (GG)", valor:20, limiteProt:3, icone:"🥘"}
    ],
    proteinas:[
        { id:1, nome:"Frango Grelhado", icone:"🍗"},
        { id:2, nome:"Carne Moída", icone:"🥩"},
        { id:3, nome:"Iscas de Peixe", icone:"🐟"},
        { id:4, nome:"Ovo Cozido", icone:"🥚"}
    ],
    carboidratos:[
        { id:1, nome:"Arroz Branco", icone:"🍚"},
        { id:2, nome:"Baião de Dois", icone:"🍲"},
        { id:3, nome:"Macarrão", icone:"🍝"}
    ],
    extras:[
        { id:1, nome:"Farofa", icone:"🥘"},
        { id:2, nome:"Salada Verde", icone:"🥗"},
        { id:3, nome:"Batata Palha", icone:"🍟"},
        { id:4, nome:"Vinagrete", icone:"🍅"}
    ]
};

let etapaAtual = 0;
let carrinho = [];
let bloqueado = false;
let pratoMontando = { tamanho: null, proteinas: [], carboidratos: [], extras: [] };

// --- LÓGICA DE HORÁRIO ---
function verificarHorario() {
    const agora = new Date();
    const hora = agora.getHours();
    const min = agora.getMinutes();
    const totalMinutos = (hora * 60) + min;

    const inicio = 18 * 60; // 18:00
    const fim = (23 * 60) + 58; // 23:58

    if (totalMinutos < inicio || totalMinutos > fim) {
        document.getElementById("tela-fechada").style.display = "flex";
        return false;
    }
    return true;
}

function ignorarHorarioParaTeste() {
    document.getElementById("tela-fechada").style.display = "none";
}

// --- RENDERIZAÇÃO ---
function renderizar() {
    const grid = document.getElementById("area-selecao");
    const titulo = document.getElementById("titulo-etapa");
    grid.innerHTML = "";

    // Atualiza visual das etapas (barrinha azul)
    document.querySelectorAll(".passo").forEach((p, idx) => {
        p.classList.toggle("ativo", idx === etapaAtual);
    });

    if (etapaAtual === 0) {
        titulo.innerText = "Escolha o Tamanho";
        DADOS.tamanhos.forEach(t => {
            const sel = pratoMontando.tamanho?.id === t.id ? 'selecionado' : '';
            grid.innerHTML += `
                <div class="card ${sel}" onclick="selecionarTamanho(${t.id})">
                    <span class="emoji-grande">${t.icone}</span>
                    <strong>${t.nome}</strong>
                    <span class="preco">R$ ${t.valor.toFixed(2)}</span>
                    <small style="font-size:10px">${t.limiteProt} proteína(s)</small>
                </div>`;
        });
    } else {
        const tipos = ["", "proteinas", "carboidratos", "extras"];
        const tipo = tipos[etapaAtual];
        const lista = DADOS[tipo];
        
        let limite = 0;
        if (etapaAtual === 1) limite = pratoMontando.tamanho.limiteProt;
        if (etapaAtual === 2) limite = 2; // Limite de 2 carbos
        if (etapaAtual === 3) limite = 10; // Extras "livre"

        titulo.innerText = `Escolha ${tipo.toUpperCase()}`;
        
        lista.forEach(item => {
            const qtd = pratoMontando[tipo].filter(i => i.id === item.id).length;
            const totalJaSelecionado = pratoMontando[tipo].length;
            const desativarMais = totalJaSelecionado >= limite;

            grid.innerHTML += `
                <div class="card ${qtd > 0 ? 'selecionado' : ''}">
                    <span class="emoji-grande">${item.icone}</span>
                    <strong style="font-size:13px">${item.nome}</strong>
                    <div class="controles">
                        <button class="btn-circular" onclick="mudarQtd('${tipo}', ${item.id}, -1)">-</button>
                        <strong>${qtd}</strong>
                        <button class="btn-circular" ${desativarMais ? 'disabled' : ''} onclick="mudarQtd('${tipo}', ${item.id}, 1)">+</button>
                    </div>
                </div>`;
        });
    }
}

// --- LOGICA DE SELEÇÃO ---
function selecionarTamanho(id) {
    pratoMontando.tamanho = DADOS.tamanhos.find(t => t.id === id);
    renderizar();
}

function mudarQtd(tipo, id, op) {
    const item = DADOS[tipo].find(i => i.id === id);
    
    if (op === 1) {
        // Validação Carbo: Proibido Arroz + Baião (Tarefa 1)
        if (tipo === "carboidratos") {
            const nomesAtuais = pratoMontando.carboidratos.map(c => c.nome);
            if (item.nome === "Arroz Branco" && nomesAtuais.includes("Baião de Dois") ||
                item.nome === "Baião de Dois" && nomesAtuais.includes("Arroz Branco")) {
                alert("Não é permitido Arroz e Baião juntos!");
                return;
            }
            if (nomesAtuais.includes(item.nome)) {
                alert("Você já escolheu este item!");
                return;
            }
        }
        
        // Validação Extras: Não repetir o mesmo (Tarefa 2)
        if (tipo === "extras") {
            if (pratoMontando.extras.find(e => e.id === id)) {
                alert("Item já adicionado!");
                return;
            }
        }

        pratoMontando[tipo].push(item);
    } else {
        const index = pratoMontando[tipo].findIndex(i => i.id === id);
        if (index > -1) pratoMontando[tipo].splice(index, 1);
    }
    renderizar();
}

function avancar() {

    if(bloqueado) return
    bloqueado = true
    setTimeout(()=>bloqueado=false,500)
    if (etapaAtual === 0) {
        if (!pratoMontando.tamanho) return alert("Selecione um tamanho!");
        etapaAtual = 1;
    } else if (etapaAtual === 1) {
        if (pratoMontando.proteinas.length !== pratoMontando.tamanho.limiteProt) 
            return alert(`Escolha exatamente ${pratoMontando.tamanho.limiteProt} proteína(s)!`);
        etapaAtual = 2;
    } else if (etapaAtual === 2) {
        if (pratoMontando.carboidratos.length === 0) return alert("Escolha ao menos 1 carboidrato!");
        etapaAtual = 3;
        document.getElementById("btn-proximo").innerText = "Finalizar Prato";
    } else if (etapaAtual === 3) {
        carrinho.push(JSON.parse(JSON.stringify(pratoMontando)));
        pratoMontando = { tamanho: null, proteinas: [], carboidratos: [], extras: [] };
        etapaAtual = 0;
        document.getElementById("btn-proximo").innerText = "Avançar";
        alert("Prato adicionado ao carrinho!");
        atualizarTotal();
    }
    renderizar();
}

// --- CARRINHO E WHATSAPP ---
function atualizarTotal() {
    const total = carrinho.reduce((acc, p) => acc + p.tamanho.valor, 0);
    document.getElementById("visor-total").innerText = `R$ ${total.toFixed(2)}`;
    document.getElementById("contagem-carrinho").innerText = carrinho.length;
}

function abrirCarrinho() {
    if (carrinho.length === 0) return alert("Carrinho vazio!");
    const lista = document.getElementById("lista-carrinho");
    lista.innerHTML = "";
    
    carrinho.forEach((p, idx) => {
        lista.innerHTML += `
            <div class="item-carrinho">
                <strong>${idx+1}. Prato ${p.tamanho.nome}</strong><br>
                <small>Prots: ${p.proteinas.map(i=>i.nome).join(", ")}</small><br>
                <small>Carbos: ${p.carboidratos.map(i=>i.nome).join(", ")}</small><br>
                <small>Extras: ${p.extras.map(i=>i.nome).join(", ") || "Nenhum"}</small><br>
                <button onclick="remover(${idx})" style="color:red; border:none; background:none; font-size:11px; cursor:pointer;">Remover</button>
            </div>`;
    });
    
    const total = carrinho.reduce((acc, p) => acc + p.tamanho.valor, 0);
    document.getElementById("total-modal").innerText = `Total: R$ ${total.toFixed(2)}`;
    document.getElementById("modal-carrinho").style.display = "block";
}

function fecharCarrinho() { document.getElementById("modal-carrinho").style.display = "none"; }

function remover(idx) {
    carrinho.splice(idx, 1);
    if (carrinho.length === 0) fecharCarrinho();
    else abrirCarrinho();
    atualizarTotal();
}

function enviarWhatsApp() {
    let msg = "*NOVO PEDIDO GOURMET*\n\n";
    carrinho.forEach((p, i) => {
        msg += `*${i+1}. PRATO ${p.tamanho.nome.toUpperCase()}*\n`;
        msg += `🥩 Prots: ${p.proteinas.map(pt => pt.nome).join(", ")}\n`;
        msg += `🍚 Carbo: ${p.carboidratos.map(c => c.nome).join(", ")}\n`;
        if(p.extras.length) msg += `🥗 Extras: ${p.extras.map(e => e.nome).join(", ")}\n`;
        msg += `--------------------------\n`;
    });
    const total = carrinho.reduce((acc, p) => acc + p.tamanho.valor, 0);
    msg += `\n*TOTAL: R$ ${total.toFixed(2)}*`;
    
    const fone = "5585992264734";
    window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`);
}

// Início
window.onload = () => {
    verificarHorario();
    renderizar();
};
</script>
</body>
</html>
